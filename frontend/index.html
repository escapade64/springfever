<meta charset="utf-8" />
<title>SpringFever - Fenetres meteo outdoor</title>
<link rel="stylesheet" href="style.css" />

<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="SpringFever" />

<header>
  <h1>SpringFever</h1>
  <p class="activity">Funboard</p>
  <nav id="spot-selector"></nav>
</header>

<form id="criteria-form">
  <label>
    Vent min (noeuds)
    <input type="number" id="min_speed" value="15" min="0" step="1" />
  </label>
  <label>
    Direction (degres, 0=N, 90=E, 180=S, 270=O)
    <input type="number" id="direction_center" value="270" min="0" max="360" step="1" />
  </label>
  <label>
    Tolerance (+/- degres)
    <input type="number" id="tolerance" value="30" min="0" max="180" step="1" />
  </label>
  <button type="submit">Actualiser</button>
</form>

<div id="status"></div>
<div id="results"></div>

<script src="config.js"></script>
<script src="weather.js"></script>
<script src="criteria.js"></script>
<script src="app.js"></script>
